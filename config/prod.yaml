e-cam-service:
  port: "8001"

# 安全配置
security:
  # 云账号 AccessKeySecret 加密密钥 (必须是 16/24/32 字节)
  # 生产环境建议使用环境变量: CAM_ENCRYPTION_KEY
  encryption_key: "48CpLbg+M(HhZa~R"

# 日志配置
logger:
  default:
    level: "info"

crypto_aes_key: "1234567890"

# 数据加密，根据模块划分
encryption:
  user:
    version: "V1"
    key: "1234567890"
  resource:
    version: "V1"
    key: "1234567890"
  runner:
    version: "V1"
    key: "1234567890"

ldap:
  url: "ldap://106.52.187.69:389"
  base_dn: "DC=example,DC=com"
  bind_dn: "CN=cn,OU=ou,DC=example,DC=com"
  bind_password: "1234567890"
  username_attribute: "sAMAccountName"
  mail_attribute: "mail"
  display_name_attribute: "displayName"
  title_attribute: "title"
  group_name_attribute: "cn"
  user_filter: "(&(sAMAccountName={input})(!(UserAccountControl=514)))"
  group_filter: "(|(member={dn}))"

session:
  session_encrypted_key: "1234567890Key"
  cookie:
    domain: ".example.com"
    name: "ecmdb-token-key"

redis:
  addr: "106.52.187.69:6379"
  password: "1234567890"
  db: 3

casbin:
  redis:
    addr: "106.52.187.69:6379"
    db: 2
    password: ""

mongodb:
  dsn: mongodb://106.52.187.69:27017/ecam?authSource=admin
  db: ecam
  username: ecmdb
  password: 123456

etcd:
  endpoints:
    - 106.52.187.69:2379

cronjob:
  enabled: true

# 认证中间件配置
auth:
  whitelist:
    - "/api/v1/cam/health"
    - "/swagger/*"
    - "/docs"
    - "/api/v1/cam/topology/declarations"  # APM 推送脚本内部调用，无需用户 session

# 策略检查中间件配置
policy:
  fail_mode: "fail_open"
  whitelist:
    - "/api/v1/cam/topology/declarations"  # APM 推送脚本内部调用，跳过策略检查

grpc:
  server:
    name: "e-cam-service"
    port: 8099
    etcdTTL: 60
    key: "1234567890"
  client:
    ecmdb:
      target: "etcd:///service/e-cam-service"
      secure: false
      key: "1234567890"
